# Name of the packaged application.
QPKG_NAME="netbird"

# Name of the display application (shown in QTS App Center).
QPKG_DISPLAY_NAME="Netbird VPN"

# Version of the packaged application.
# Updated by CI to match the upstream netbird release tag.
QPKG_VER="0.0.0"

# Author or maintainer of the package.
QPKG_AUTHOR="zachhandley"

# License for the packaged application.
QPKG_LICENSE="BSD-3-Clause"

# One-line description of the packaged application.
QPKG_SUMMARY="WireGuard-based mesh VPN client for Netbird networks"

# Preferred number in start/stop sequence.
QPKG_RC_NUM="101"

# Init-script used to control the installed application.
QPKG_SERVICE_PROGRAM="netbird.sh"

# Location of file with running service's PID.
QPKG_SERVICE_PIDFILE="/var/run/netbird.pid"

# Minimum QTS version requirement.
QTS_MINI_VERSION="4.3.0"

# Volume selection: 1=install, 2=migrate, 3=both.
QPKG_VOLUME_SELECT="3"

# Timeout for enable/disable (start_seconds,stop_seconds).
QPKG_TIMEOUT="60,30"

# Web UI: symlinked into /home/Qhttpd/Web/, served by QTS Apache.
# Pattern from QNAP official examples (QDK-Guide breakout, helloWorld).
QPKG_WEBUI="/netbird/"
QPKG_USE_PROXY="1"
QPKG_DESKTOP_APP="1"
QPKG_DESKTOP_APP_WIN_WIDTH="700"
QPKG_DESKTOP_APP_WIN_HEIGHT="500"

# Location of icons for the packaged application.
QDK_DATA_DIR_ICONS="icons"

# Location of files specific to x86_64 packages.
QDK_DATA_DIR_X86_64="x86_64"

# Location of files common to all architectures.
QDK_DATA_DIR_SHARED="shared"
