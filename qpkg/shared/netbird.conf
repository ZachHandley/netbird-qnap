# Netbird VPN Configuration for QNAP
# ====================================
# This file is sourced by the netbird service script at startup.
# Edit this file and restart the service to apply changes:
#   /etc/init.d/netbird.sh restart
#
# All variables are optional except SETUP_KEY (required for initial registration).

# REQUIRED: Your Netbird setup key.
# Obtain from the Netbird management dashboard (app.netbird.io) under Setup Keys.
SETUP_KEY=""

# Management server URL.
# Default: Netbird's hosted service (https://api.wiretrustee.com:443)
# Set this only if you run a self-hosted Netbird management server.
#MANAGEMENT_URL=""

# Admin dashboard URL.
# Only needed for self-hosted setups.
#ADMIN_URL=""

# Override the hostname this peer registers with.
# Default: uses the NAS system hostname.
#HOSTNAME=""

# Logging verbosity: panic, fatal, error, warn, info, debug, trace
#LOG_LEVEL="info"

# Path to write log file.
#LOG_FILE="/var/log/netbird.log"

# Extra arguments to pass to 'netbird up'.
# See 'netbird up --help' for available options.
#EXTRA_ARGS=""
